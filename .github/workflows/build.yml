name: Build firmware

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: martinger/iot_devel:1.0

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          make

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: esp_wifi_repeater
          path: |
            firmware/0x00000.bin
            firmware/0x02000.bin
            firmware/0x82000.bin
            firmware/sha1sums
